<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>OmniStream Watch Statistics</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="shell.css">
  <script src="shell.js" defer></script>
  <style>
    body{font-family:Segoe UI,Arial;background:var(--bg);color:var(--text-main);margin:0;padding:0}

    h1{margin:0 0 10px 0;color:var(--text-main);letter-spacing:0.14em;font-size:14px;text-transform:uppercase;}

    .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:10px 0 18px 0;}
    .seg{display:inline-flex;gap:0;border:1px solid rgba(148,163,184,0.22);border-radius:999px;overflow:hidden;background:rgba(0,0,0,0.18);}
    :root[data-theme="light-borderless"] .seg{background:rgba(0,0,0,0.03);border-color:#dddddd;}
    .seg button{appearance:none;border:0;background:transparent;color:var(--text-muted);font-size:12px;padding:7px 12px;cursor:pointer;}
    .seg button:hover{background:rgba(148,163,184,0.14);color:var(--text-main);}
    .seg button.active{background:rgba(59,130,246,0.18);color:var(--text-main);}

    .range{display:inline-flex;align-items:center;gap:8px;color:var(--text-muted);font-size:12px;}
    .range input{width:86px;padding:6px 10px;border-radius:10px;border:1px solid rgba(148,163,184,0.22);background:rgba(0,0,0,0.18);color:var(--text-main);}
    :root[data-theme="light-borderless"] .range input{background:rgba(0,0,0,0.03);border-color:#dddddd;color:#111111;}

    .placeholder{margin-top:16px;font-size:14px;color:var(--text-muted);}

    .main-content .grid{display:grid !important;grid-template-columns:repeat(2,minmax(0,1fr)) !important;gap:18px;}
    @media (max-width: 700px){.main-content .grid{grid-template-columns:1fr !important;}}

    .panel{position:relative;overflow:hidden;border-radius:12px;border:1px solid rgba(148,163,184,0.22);background:rgba(0,0,0,0.18);min-height:138px;}
    :root[data-theme="light-borderless"] .panel{background:rgba(0,0,0,0.03);border-color:#dddddd;}
    .panel-bg{position:absolute;inset:-18px;background-size:cover;background-position:center;filter:blur(14px);opacity:0.35;}
    .panel-bg.fallback{
      background-image:
        radial-gradient(circle at 14% 18%, var(--btn-border), rgba(0,0,0,0) 60%),
        radial-gradient(circle at 82% 52%, var(--text-muted), rgba(0,0,0,0) 58%),
        radial-gradient(circle at 42% 92%, var(--btn-text), rgba(0,0,0,0) 62%),
        linear-gradient(135deg, rgba(0,0,0,0.55), rgba(0,0,0,0.25));
      filter: blur(14px) saturate(1.25) hue-rotate(var(--hue, 0deg));
      opacity:0.42;
    }
    .panel-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,0.65),rgba(0,0,0,0.28) 60%,rgba(0,0,0,0.20));}
    :root[data-theme="light-borderless"] .panel-overlay{background:linear-gradient(90deg,rgba(255,255,255,0.92),rgba(255,255,255,0.72) 60%,rgba(255,255,255,0.60));}
    .panel-inner{position:relative;z-index:1;display:flex;gap:12px;padding:12px;}
    .thumb{width:84px;height:120px;border-radius:6px;object-fit:cover;border:1px solid rgba(148,163,184,0.18);background:rgba(0,0,0,0.10);flex:0 0 auto;}
    .panel-body{flex:1;min-width:0;}
    .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;}
    .panel-title{font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:var(--text-main);opacity:0.95;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .panel-right{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;}
    .list{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
    .row{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px;color:var(--text-main);}
    .row-left{display:flex;align-items:center;gap:10px;min-width:0;}
    .rank{width:14px;text-align:right;color:var(--text-muted);font-size:12px;flex:0 0 auto;}
    .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .avatar{width:18px;height:18px;border-radius:999px;object-fit:cover;border:1px solid rgba(148,163,184,0.22);flex:0 0 auto;background:rgba(0,0,0,0.10);}
    .name-link{color:var(--btn-border);text-decoration:none;}
    .name-link:hover{text-decoration:underline;}
    .user-link{color:var(--btn-border);text-decoration:none;}
    .user-link:hover{text-decoration:underline;}
    .value{color:var(--btn-border);font-variant-numeric:tabular-nums;}
    .muted{color:var(--text-muted);}
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">OmniStream</div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-link">Dashboard</a>
        <a href="glance.html" class="nav-link">At a glance</a>
        <a href="history.html" class="nav-link">History</a>
        <a href="reports.html" class="nav-link nav-link-active">Reports</a>
        <a href="notifications.html" class="nav-link">Notifications</a>
        <div class="settings-group">
          <button type="button" class="nav-group-toggle newsletter-toggle">Newsletter</button>
          <div class="settings-submenu newsletter-submenu">
            <a href="overseerr.html" class="submenu-link">Overseerr</a>
            <a href="subscribers.html" class="submenu-link">Subscribers</a>
            <a href="templates.html" class="submenu-link">Templates</a>
            <a href="custom-header.html" class="submenu-link">Custom header</a>
          </div>
        </div>
        <div class="settings-group">
          <button type="button" class="nav-group-toggle settings-toggle">Settings</button>
          <div class="settings-submenu">
            <a href="admin.html" class="submenu-link">Connected servers</a>
            <a href="servers.html" class="submenu-link">Servers</a>
            <a href="display.html" class="submenu-link">Themes &amp; layout</a>
            <a href="notifiers.html" class="submenu-link">Notifiers</a>
            <a href="system.html" class="submenu-link">System</a>
            <a href="about.html" class="submenu-link">About</a>
          </div>
        </div>
        <a href="/logout" class="nav-link">Logout</a>
      </nav>
    </aside>
    <main class="main-content">
      <button class="sidebar-toggle" id="sidebarToggle">Hide menu</button>
      <h1>WATCH STATISTICS</h1>

      <div class="controls">
        <div class="seg" role="group" aria-label="Metric">
          <button id="metricCount" class="active" type="button">Play Count</button>
          <button id="metricDuration" type="button">Play Duration</button>
        </div>
        <div class="range">
          <span>Last</span>
          <input id="daysInput" type="number" min="1" max="5000" step="1" value="1000" />
          <span>days</span>
        </div>
      </div>

      <div id="content" class="placeholder">Loading watch statistics...</div>
    </main>
  </div>

  <script>
    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[c]));
    }

    function hashHue(input) {
      const str = String(input ?? '');
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h) + str.charCodeAt(i);
        h |= 0;
      }
      return Math.abs(h) % 360;
    }

    function formatSeconds(sec) {
      const s = Math.max(0, Number(sec) || 0);
      if (s < 60) return Math.round(s) + 's';
      const m = Math.floor(s / 60);
      if (m < 60) return m + 'm';
      const h = Math.floor(m / 60);
      if (h < 48) return h + 'h';
      const d = Math.floor(h / 24);
      return d + 'd';
    }

    function hrefToUserHistory(user) {
      const u = String(user || '').trim();
      if (!u) return 'history.html';
      return 'history.html?user=' + encodeURIComponent(u);
    }

    function topThumb(items) {
      if (!Array.isArray(items) || !items.length) return null;
      const it = items[0] || {};
      return it.poster || it.background || null;
    }

    function panelBgUrl(items) {
      if (!Array.isArray(items) || !items.length) return '/live_tv_placeholder.svg';
      return (items[0].background || items[0].poster || '/live_tv_placeholder.svg');
    }

    function hasArtwork(items) {
      if (!Array.isArray(items) || !items.length) return false;
      const it = items[0] || {};
      return !!(it.background || it.poster);
    }

    function renderPanel(opts) {
      const title = opts.title;
      const right = opts.right;
      const items = opts.items || [];
      const valueLabel = opts.valueLabel;
      const showThumb = !!opts.showThumb;
      const showAvatars = !!opts.showAvatars;
      const linkUsers = !!opts.linkUsers;

      const thumbUrl = showThumb ? topThumb(items) : null;
      const bgUrl = panelBgUrl(items);
      const useFallbackBg = !hasArtwork(items) || bgUrl === '/live_tv_placeholder.svg';
      const hue = useFallbackBg ? hashHue(title + '|' + (items[0]?.name || items[0]?.title || '')) : 0;

      let html = '<div class="panel">';
      if (useFallbackBg) {
        html += `<div class="panel-bg fallback" style="--hue:${hue}deg;"></div>`;
      } else {
        html += `<div class="panel-bg" style="background-image:url('${escapeHtml(bgUrl)}');"></div>`;
      }
      html += '<div class="panel-overlay"></div>';
      html += '<div class="panel-inner">';
      if (showThumb) {
        const t = thumbUrl || '/live_tv_placeholder.svg';
        html += `<img class="thumb" src="${escapeHtml(t)}" alt="" onerror="this.style.display='none'"/>`;
      }
      html += '<div class="panel-body">';
      html += '<div class="panel-head">';
      html += `<div class="panel-title">${escapeHtml(title)}</div>`;
      html += `<div class="panel-right">${escapeHtml(right)}</div>`;
      html += '</div>';
      html += '<div class="list">';
      if (!items.length) {
        html += '<div class="row"><span class="muted">No data yet.</span></div>';
      } else {
        items.forEach((it, idx) => {
          const name = it.name || it.title || 'Unknown';
          const year = it.year ? ` (${it.year})` : '';
          const avatar = (it.avatar || it.userAvatar || '').toString();
          const val = (valueLabel === 'duration') ? formatSeconds(it.value) : String(it.value ?? '');
          html += '<div class="row">';
          html += '<div class="row-left">';
          html += `<div class="rank">${idx + 1}</div>`;
          if (showAvatars && avatar) {
            html += `<img class="avatar" src="${escapeHtml(avatar)}" alt="" onerror="this.style.display='none'"/>`;
          }
          if (linkUsers) {
            html += `<a class="name name-link" href="${escapeHtml(hrefToUserHistory(name))}">${escapeHtml(name + year)}</a>`;
          } else {
            html += `<div class="name">${escapeHtml(name + year)}</div>`;
          }
          html += '</div>';
          html += `<div class="value">${escapeHtml(val)}</div>`;
          html += '</div>';
        });
      }
      html += '</div>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
      return html;
    }

    function renderRecently(items) {
      const thumbUrl = topThumb(items);
      const bgUrl = panelBgUrl(items);
      const recentUser = items && items[0] && items[0].user ? String(items[0].user).toUpperCase() : 'USER';
      const useFallbackBg = !hasArtwork(items) || bgUrl === '/live_tv_placeholder.svg';
      const hue = useFallbackBg ? hashHue('Recently Watched|' + (items[0]?.title || items[0]?.name || '')) : 0;

      let html = '<div class="panel">';
      if (useFallbackBg) {
        html += `<div class="panel-bg fallback" style="--hue:${hue}deg;"></div>`;
      } else {
        html += `<div class="panel-bg" style="background-image:url('${escapeHtml(bgUrl)}');"></div>`;
      }
      html += '<div class="panel-overlay"></div>';
      html += '<div class="panel-inner">';
      html += `<img class="thumb" src="${escapeHtml(thumbUrl || '/live_tv_placeholder.svg')}" alt="" onerror="this.style.display='none'"/>`;
      html += '<div class="panel-body">';
      html += '<div class="panel-head">';
      html += '<div class="panel-title">Recently Watched</div>';
      html += `<div class="panel-right">${escapeHtml(recentUser)}</div>`;
      html += '</div>';
      html += '<div class="list">';
      if (!items || !items.length) {
        html += '<div class="row"><span class="muted">No data yet.</span></div>';
      } else {
        items.forEach((it, idx) => {
          const title = it.title || 'Unknown';
          const userRaw = it.user ? String(it.user) : '';
          const user = userRaw ? userRaw.toUpperCase() : '';
          const avatar = (it.userAvatar || it.avatar || '').toString();
          html += '<div class="row">';
          html += '<div class="row-left">';
          html += `<div class="rank">${idx + 1}</div>`;
          html += `<div class="name">${escapeHtml(title)}</div>`;
          html += '</div>';
          if (userRaw) {
            html += '<div class="value">';
            html += `<a class="user-link" href="${escapeHtml(hrefToUserHistory(userRaw))}" style="display:inline-flex;align-items:center;gap:8px;">`;
            if (avatar) {
              html += `<img class="avatar" src="${escapeHtml(avatar)}" alt="" onerror="this.style.display='none'"/>`;
            }
            html += `<span>${escapeHtml(user)}</span>`;
            html += '</a>';
            html += '</div>';
          } else {
            html += `<div class="value">${escapeHtml(user)}</div>`;
          }
          html += '</div>';
        });
      }
      html += '</div>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
      return html;
    }

    function renderConcurrent(concurrent) {
      const c = concurrent || { streams: 0, transcodes: 0, directPlays: 0 };
      const items = [
        { name: 'Concurrent Streams', value: c.streams ?? 0 },
        { name: 'Concurrent Transcodes', value: c.transcodes ?? 0 },
        { name: 'Concurrent Direct Plays', value: c.directPlays ?? 0 }
      ];
      return renderPanel({ title: 'Peak Concurrent Streams', right: 'STREAMS', items, valueLabel: 'count', showThumb: false });
    }

    async function fetchWatchStats(metric, days) {
      const url = `/api/reports/watch-statistics?metric=${encodeURIComponent(metric)}&days=${encodeURIComponent(days)}`;
      const r = await fetch(url);
      if (!r.ok) throw new Error('Failed to load reports');
      return await r.json();
    }

    const content = document.getElementById('content');
    const metricCountBtn = document.getElementById('metricCount');
    const metricDurationBtn = document.getElementById('metricDuration');
    const daysInput = document.getElementById('daysInput');
    let state = { metric: 'count', days: 1000 };

    function setMetric(metric) {
      state.metric = metric;
      metricCountBtn.classList.toggle('active', metric === 'count');
      metricDurationBtn.classList.toggle('active', metric === 'duration');
      render();
    }

    async function render() {
      content.className = 'placeholder';
      content.textContent = 'Loading watch statistics...';
      try {
        const data = await fetchWatchStats(state.metric, state.days);
        const s = data.sections || {};
        const valueLabel = data.metric === 'duration' ? 'duration' : 'count';
        const playsOrDuration = data.metric === 'duration' ? 'DURATION' : 'PLAYS';

        let html = '<div class="grid">';
        html += renderPanel({ title: 'Most Watched Movies', right: playsOrDuration, items: s.mostWatchedMovies || [], valueLabel, showThumb: true });
        html += renderPanel({ title: 'Most Popular Movies', right: 'USERS', items: s.mostPopularMovies || [], valueLabel: 'count', showThumb: true });
        html += renderPanel({ title: 'Most Watched TV Shows', right: playsOrDuration, items: s.mostWatchedTvShows || [], valueLabel, showThumb: true });
        html += renderPanel({ title: 'Most Popular TV Shows', right: 'USERS', items: s.mostPopularTvShows || [], valueLabel: 'count', showThumb: true });
        html += renderPanel({ title: 'Most Played Artists', right: playsOrDuration, items: s.mostPlayedArtists || [], valueLabel, showThumb: true });
        html += renderPanel({ title: 'Most Popular Artists', right: 'USERS', items: s.mostPopularArtists || [], valueLabel: 'count', showThumb: true });
        html += renderRecently(s.recentlyWatched || []);
        html += renderPanel({ title: 'Most Active Libraries', right: playsOrDuration, items: s.mostActiveLibraries || [], valueLabel, showThumb: false });
        html += renderPanel({ title: 'Most Active Users', right: playsOrDuration, items: s.mostActiveUsers || [], valueLabel, showThumb: false, showAvatars: true, linkUsers: true });
        html += renderPanel({ title: 'Most Active Platforms', right: playsOrDuration, items: s.mostActivePlatforms || [], valueLabel, showThumb: false });
        html += renderConcurrent(s.mostConcurrentStreams);
        html += '</div>';

        content.className = '';
        content.innerHTML = html;
      } catch (e) {
        console.error(e);
        content.className = 'placeholder';
        content.textContent = 'Failed to load watch statistics.';
      }
    }

    metricCountBtn.addEventListener('click', () => setMetric('count'));
    metricDurationBtn.addEventListener('click', () => setMetric('duration'));
    daysInput.addEventListener('change', () => {
      const v = Number(daysInput.value);
      state.days = Number.isFinite(v) ? Math.max(1, Math.min(5000, Math.floor(v))) : 1000;
      daysInput.value = String(state.days);
      render();
    });

    render();
  </script>
</body>
</html>
