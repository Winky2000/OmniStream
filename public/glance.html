<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>OmniStream - At a glance</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="shell.css">
  <script src="shell.js" defer></script>
  <style>
    body{font-family:Segoe UI,Arial;background:var(--bg);color:var(--text-main);margin:0;padding:0}
    .main-content{padding:20px;}

    .header-flex{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
    h1{margin:0;color:var(--text-main);letter-spacing:0.5px;display:inline-block;vertical-align:middle;font-size:1.8em;font-weight:600;}
    .logo-img{height:54px;max-width:160px;object-fit:contain;border-radius:8px;}

    #grid{display:flex;flex-direction:column;gap:18px;align-items:stretch;}

    .card{
      background:var(--card-bg);
      border-radius:14px;
      padding:18px 18px 14px 18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.35);
      border:1px solid rgba(148, 163, 184, 0.28);
      width:100%;
      transition:border-color 0.2s, box-shadow 0.2s;
    }
    .card.offline{border-color:var(--border-offline);box-shadow:none;opacity:0.65;}

    .title{font-weight:600;margin-bottom:6px;color:var(--text-main)}
    .meta{font-size:13px;color:var(--text-muted);margin-bottom:10px}

    .sessions-glance{
      border-top:1px solid rgba(148,163,184,0.18);
      padding-top:12px;
      margin-top:12px;
      display:flex;
      flex-direction:row;
      flex-wrap:nowrap;
      gap:10px;
      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:thin;
    }

    .sessions-glance.wrap{
      flex-wrap:wrap;
      overflow-x:hidden;
      overflow-y:visible;
    }

    .sessions-footer{
      margin-top:10px;
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:10px;
    }
    .sessions-footer-note{font-size:12px;color:var(--text-faint);}
    .sessions-footer-btn{
      padding:4px 10px;
      border-radius:999px;
      border:1px solid var(--btn-border);
      background:var(--btn-bg);
      color:var(--btn-text);
      cursor:pointer;
      font-size:12px;
    }
    .sessions-footer-btn:hover{background:var(--btn-bg-hover);color:var(--btn-text-hover);}

    .session-tiny{
      border-radius:10px;
      border:1px solid rgba(148,163,184,0.20);
      padding:8px;
      display:flex;
      flex-direction:row;
      align-items:center;
      gap:8px;
      min-width:175px;
      max-width:175px;
      background:rgba(15,23,42,0.45);
      overflow:hidden;
    }
    :root[data-theme="light"] .session-tiny,
    :root[data-theme="light-borderless"] .session-tiny{background:rgba(0,0,0,0.03);}

    .session-tiny.direct{border-color:var(--session-direct);}
    .session-tiny.transcode{border-color:var(--session-transcode);}

    .poster-tiny{width:44px;height:66px;flex-shrink:0;border-radius:6px;object-fit:cover;background:rgba(0,0,0,0.15);}
    .poster-tiny-placeholder{
      display:flex;align-items:center;justify-content:center;
      color:var(--text-main);font-weight:700;font-size:14px;
      text-transform:uppercase;
    }

    .tiny-info{min-width:0;display:flex;flex-direction:column;gap:6px;}
    .tiny-title{font-size:12px;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tiny-user{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);min-width:0;}
    .tiny-user-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tiny-avatar{width:18px;height:18px;border-radius:50%;object-fit:cover;flex-shrink:0;}

    .empty-sessions{font-size:12px;color:var(--text-faint);}
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">OmniStream</div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-link">Dashboard</a>
        <a href="glance.html" class="nav-link nav-link-active">At a glance</a>
        <a href="history.html" class="nav-link">History</a>
        <a href="reports.html" class="nav-link">Reports</a>
        <a href="libraries.html" class="nav-link">Libraries</a>
        <a href="notifications.html" class="nav-link">Notifications</a>
        <div class="settings-group">
          <button type="button" class="nav-group-toggle newsletter-toggle">Newsletter</button>
          <div class="settings-submenu newsletter-submenu">
            <a href="overseerr.html" class="submenu-link">Overseerr</a>
            <a href="subscribers.html" class="submenu-link">Subscribers</a>
            <a href="templates.html" class="submenu-link">Templates</a>
            <a href="custom-header.html" class="submenu-link">Custom header</a>
            <a href="sent-newsletters.html" class="submenu-link">Sent history</a>
          </div>
        </div>
        <div class="settings-group">
          <button type="button" class="nav-group-toggle settings-toggle">Settings</button>
          <div class="settings-submenu">
            <a href="admin.html" class="submenu-link">Connected servers</a>
            <a href="servers.html" class="submenu-link">Servers</a>
            <a href="display.html" class="submenu-link">Themes &amp; layout</a>
            <a href="notifiers.html" class="submenu-link">Notifiers</a>
            <a href="system.html" class="submenu-link">System</a>
            <a href="about.html" class="submenu-link">About</a>
          </div>
        </div>
        <a href="/logout" class="nav-link">Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <button class="sidebar-toggle" id="sidebarToggle">Hide menu</button>
      <div class="header-flex">
        <img src="omnistream_logo.png" alt="OmniStream Logo" class="logo-img" />
        <div>
          <h1>At a glance</h1>
          <div id="globalSummary" style="font-size:12px;color:var(--text-muted);margin-top:4px;"></div>
        </div>
      </div>

      <div id="grid"></div>
    </main>
  </div>

  <script>
    async function fetchStatus() {
      try {
        const r = await fetch('/api/status');
        return await r.json();
      } catch (e) {
        console.error(e);
        return { servers: [], statuses: {} };
      }
    }

    const EXPANDED_KEY = 'omnistreamGlanceExpandedServers';
    const expandedServers = new Set();
    let lastData = null;

    function loadExpandedServers() {
      try {
        const raw = localStorage.getItem(EXPANDED_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return;
        expandedServers.clear();
        parsed.forEach(id => {
          if (id !== null && id !== undefined) expandedServers.add(String(id));
        });
      } catch (_) {
        // ignore
      }
    }

    function saveExpandedServers() {
      try {
        localStorage.setItem(EXPANDED_KEY, JSON.stringify(Array.from(expandedServers)));
      } catch (_) {
        // ignore
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadExpandedServers();
    });

    function nowPlayingLabel(sess) {
      const isLive = !!sess.isLive;
      const mediaType = (sess.mediaType || '').toString().toLowerCase();
      const hasEpisode = (mediaType === 'episode')
        || !!(sess.episode || sess.episodeTitle)
        || (typeof sess.seasonNumber === 'number')
        || (typeof sess.episodeNumber === 'number');

      if (isLive) {
        const channelName = sess.channel || 'Live TV';
        const program = sess.title || sess.episodeTitle || '';
        return program ? `${channelName} - ${program}` : channelName;
      }

      if (hasEpisode) {
        const showName = sess.seriesTitle || sess.title || 'Unknown Show';
        const episodeName = sess.episode || sess.episodeTitle || sess.title || 'Episode';
        return `${showName} - ${episodeName}`;
      }

      return sess.title || sess.channel || 'Playing';
    }

    function render(data) {
      const { servers = [], statuses = {}, setup = false, poll = {}, update = {} } = data;
      const grid = document.getElementById('grid');
      const sidebar = document.querySelector('.sidebar');
      const globalSummary = document.getElementById('globalSummary');

      if (setup || !servers.length) {
        if (sidebar) sidebar.style.display = 'none';
        grid.textContent = 'No servers configured.';
        return;
      }
      if (sidebar) sidebar.style.display = '';

      // Global summary
      let online = 0, offline = 0, totalStreams = 0;
      servers.forEach(s => {
        const st = statuses && statuses[s.id] ? statuses[s.id] : null;
        if (!st) {
          offline++;
          return;
        }
        if (st.online) online++; else offline++;
        const sessions = Array.isArray(st.sessions) ? st.sessions : [];
        totalStreams += sessions.length;
      });
      if (globalSummary) {
        const lastAt = poll.lastPollAt ? new Date(poll.lastPollAt).toLocaleTimeString() : '-';
        const parts = [];
        parts.push(`${servers.length} servers (${online} online${offline ? ", " + offline + " offline" : ""})`);
        parts.push(`${totalStreams} streams`);
        parts.push(`last updated ${lastAt}`);
        if (update && update.updateAvailable === true) {
          const latest = update.latestVersion ? String(update.latestVersion) : 'new version';
          parts.push(`update available: ${latest}`);
        }
        globalSummary.textContent = parts.join('  •  ');
      }

      const frag = document.createDocumentFragment();
      servers.forEach(s => {
        const st = statuses && statuses[s.id] ? statuses[s.id] : { online: false };
        const card = document.createElement('div');
        card.className = 'card ' + (st.online ? '' : 'offline');

        const title = document.createElement('div');
        title.className = 'title';
        title.textContent = s.name || s.baseUrl;

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `${s.type || 'generic'} \u2022 ${st.online ? 'Online' : 'Offline'}`;

        card.appendChild(title);
        card.appendChild(meta);

        const sessions = (st.online && Array.isArray(st.sessions)) ? st.sessions : [];
        const visibleSessions = sessions.filter(sess => sess && (sess.poster || sess.title || sess.user || sess.userName));

        if (st.online && visibleSessions.length > 0) {
          const sessionsDiv = document.createElement('div');
          const expanded = expandedServers.has(String(s.id));
          sessionsDiv.className = 'sessions-glance' + (expanded ? ' wrap' : '');

          const maxCards = 25;
          const sliceCount = expanded ? visibleSessions.length : maxCards;
          visibleSessions.slice(0, sliceCount).forEach(sess => {
            let isTranscoding = false;
            if (typeof sess.transcoding === 'boolean') {
              isTranscoding = sess.transcoding;
            } else if (sess.stream && typeof sess.stream === 'string' && sess.stream.toLowerCase().includes('transcode')) {
              isTranscoding = true;
            } else if (sess.state && typeof sess.state === 'string' && sess.state.toLowerCase().includes('transcode')) {
              isTranscoding = true;
            }

            const tiny = document.createElement('div');
            tiny.className = 'session-tiny ' + (isTranscoding ? 'transcode' : 'direct');

            function createPosterPlaceholder() {
              const ph = document.createElement('div');
              ph.className = 'poster-tiny poster-tiny-placeholder';
              const channel = (sess.channel || '').toString().trim();
              const text = (channel ? channel.slice(0, 3) : (nowPlayingLabel(sess).slice(0, 1) || 'TV')).toUpperCase();
              ph.textContent = text;
              ph.title = nowPlayingLabel(sess);
              return ph;
            }

            const poster = document.createElement('img');
            poster.className = 'poster-tiny';
            poster.alt = 'Poster';
            poster.src = sess.poster || '/live_tv_placeholder.svg';
            poster.onerror = function() {
              if (!this.dataset.fallbackApplied) {
                this.dataset.fallbackApplied = '1';
                this.src = '/live_tv_placeholder.svg';
                return;
              }
              if (this.parentNode) this.parentNode.replaceChild(createPosterPlaceholder(), this);
            };
            tiny.appendChild(poster);

            const info = document.createElement('div');
            info.className = 'tiny-info';

            const titleLine = document.createElement('div');
            titleLine.className = 'tiny-title';
            titleLine.textContent = nowPlayingLabel(sess);
            titleLine.title = titleLine.textContent;
            info.appendChild(titleLine);

            const userRow = document.createElement('div');
            userRow.className = 'tiny-user';
            const userName = sess.user || sess.userName || 'Unknown';

            if (sess.userAvatar) {
              const avatar = document.createElement('img');
              avatar.className = 'tiny-avatar';
              avatar.src = sess.userAvatar;
              avatar.alt = userName;
              avatar.onerror = function() {
                if (this.parentNode) this.parentNode.removeChild(this);
              };
              userRow.appendChild(avatar);
            }

            const userNameSpan = document.createElement('div');
            userNameSpan.className = 'tiny-user-name';
            userNameSpan.textContent = userName;
            userNameSpan.title = userName;
            userRow.appendChild(userNameSpan);

            info.appendChild(userRow);
            tiny.appendChild(info);
            sessionsDiv.appendChild(tiny);
          });

          card.appendChild(sessionsDiv);

          if (visibleSessions.length > maxCards) {
            const footer = document.createElement('div');
            footer.className = 'sessions-footer';

            const note = document.createElement('div');
            note.className = 'sessions-footer-note';
            note.textContent = expanded
              ? `Showing all ${visibleSessions.length}`
              : `Showing ${maxCards} of ${visibleSessions.length}`;
            footer.appendChild(note);

            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'sessions-footer-btn';
            btn.textContent = expanded ? 'Show less' : `Show all (${visibleSessions.length})`;
            btn.addEventListener('click', () => {
              const id = String(s.id);
              if (expandedServers.has(id)) expandedServers.delete(id);
              else expandedServers.add(id);
              saveExpandedServers();
              if (lastData) render(lastData);
            });
            footer.appendChild(btn);

            card.appendChild(footer);
          }
        } else if (st.online) {
          const empty = document.createElement('div');
          empty.className = 'empty-sessions';
          empty.textContent = 'No active sessions.';
          card.appendChild(empty);
        }

        frag.appendChild(card);
      });

      grid.replaceChildren(frag);
    }

    let lastSig = null;
    function signature(data) {
      try {
        const servers = Array.isArray(data.servers) ? data.servers : [];
        const statuses = data.statuses || {};
        const summary = servers.map(s => {
          const st = statuses[s.id] || {};
          const sessions = Array.isArray(st.sessions) ? st.sessions : [];
          return { id: s.id, online: !!st.online, sessionCount: sessions.length };
        });
        summary.sort((a, b) => String(a.id).localeCompare(String(b.id)));
        return JSON.stringify(summary);
      } catch (e) {
        return null;
      }
    }

    async function loop() {
      const data = await fetchStatus();
      lastData = data;
      const sig = signature(data);
      if (sig && sig === lastSig) return;
      lastSig = sig;
      render(data);
    }

    loop();
    setInterval(loop, 10000);
  </script>
</body>
</html>
