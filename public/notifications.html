<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>OmniStream Notifications</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="shell.css">
  <script src="shell.js" defer></script>
  <style>
    body{font-family:Segoe UI,Arial;background:var(--bg);color:var(--text-main);margin:0;padding:0}
    h1{margin:0 0 8px 0;color:var(--text-main);letter-spacing:0.5px;font-size:1.8em;font-weight:600;}
    .back-btn{margin-top:12px;padding:6px 14px;border-radius:8px;border:1px solid var(--btn-border);background:var(--btn-bg);color:var(--btn-text);cursor:pointer;}
    .back-btn:hover{background:var(--btn-bg-hover);color:var(--btn-text-hover);}
    .notif-list{margin-top:20px;display:flex;flex-direction:column;gap:10px;}
    .notif-card{background:var(--card-bg);border-radius:10px;padding:10px 14px;box-shadow:0 2px 8px #0006;border-left:4px solid #00bfff;font-size:13px;}
    .notif-card.warn{border-left-color:#f0a500;}
    .notif-card.error{border-left-color:#ff073a;}
    .notif-title{font-weight:600;margin-bottom:4px;}
    .notif-meta{font-size:11px;color:var(--text-muted);}
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">OmniStream</div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-link">Dashboard</a>
        <a href="glance.html" class="nav-link">At a glance</a>
        <a href="history.html" class="nav-link">History</a>
        <a href="reports.html" class="nav-link">Reports</a>
        <a href="libraries.html" class="nav-link">Libraries</a>
        <a href="notifications.html" class="nav-link nav-link-active">Notifications</a>
        <div class="settings-group">
          <button type="button" class="nav-group-toggle newsletter-toggle">Newsletter</button>
          <div class="settings-submenu newsletter-submenu">
            <a href="overseerr.html" class="submenu-link">Overseerr</a>
            <a href="subscribers.html" class="submenu-link">Subscribers</a>
            <a href="templates.html" class="submenu-link">Templates</a>
            <a href="custom-header.html" class="submenu-link">Custom header</a>
            <a href="sent-newsletters.html" class="submenu-link">Sent history</a>
          </div>
        </div>
        <div class="settings-group">
          <button type="button" class="nav-group-toggle settings-toggle">Settings</button>
          <div class="settings-submenu">
            <a href="admin.html" class="submenu-link">Connected servers</a>
            <a href="servers.html" class="submenu-link">Servers</a>
            <a href="display.html" class="submenu-link">Themes &amp; layout</a>
            <a href="notifiers.html" class="submenu-link">Notifiers</a>
            <a href="system.html" class="submenu-link">System</a>
            <a href="about.html" class="submenu-link">About</a>
          </div>
        </div>
        <a href="/logout" class="nav-link">Logout</a>
      </nav>
    </aside>
    <main class="main-content">
  <button class="sidebar-toggle" id="sidebarToggle">Hide menu</button>
  <h1>Notifications</h1>
  <div id="notifList" class="notif-list"></div>
  <button class="back-btn" onclick="window.location.href='admin.html'">Back to Settings</button>
  <script>
    async function fetchNotifications() {
      try {
        const r = await fetch('/api/notifications');
        return await r.json();
      } catch (e) {
        console.error(e);
        return { notifications: [] };
      }
    }

    async function renderNotifications() {
      const data = await fetchNotifications();
      const list = document.getElementById('notifList');
      list.innerHTML = '';
      const notifs = data.notifications || [];
      if (!notifs.length) {
        const empty = document.createElement('div');
        empty.textContent = 'No active alerts.';
        empty.style.fontSize = '14px';
        empty.style.color = '#b0b3b8';
        list.appendChild(empty);
        return;
      }
      notifs.forEach(n => {
        const card = document.createElement('div');
        card.className = 'notif-card ' + (n.level || 'info');
        const title = document.createElement('div');
        title.className = 'notif-title';
        title.textContent = n.message;
        const meta = document.createElement('div');
        meta.className = 'notif-meta';
        const when = n.time ? new Date(n.time).toLocaleTimeString() : '';
        meta.textContent = `${n.serverName || ''} ${when ? '• ' + when : ''}`.trim();
        card.appendChild(title);
        card.appendChild(meta);
        list.appendChild(card);
      });
    }

    renderNotifications();
    setInterval(renderNotifications, 10000);
  </script>
    </main>
  </div>
</body>
</html>
