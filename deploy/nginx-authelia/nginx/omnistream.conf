# OmniStream protected by Authelia (2FA) via auth_request
#
# This is a minimal *HTTP* example for local/LAN usage.
# For real deployments, terminate TLS and use secure cookies.

upstream omnistream_upstream {
  server omnistream:3000;
  keepalive 16;
}

upstream authelia_upstream {
  server authelia:9091;
  keepalive 16;
}

server {
  listen 80;
  server_name _;

  # Authelia portal (served at /authelia). This keeps the example single-host.
  # If you prefer a dedicated auth subdomain, split this into a second server block.
  location /authelia/ {
    proxy_pass http://authelia_upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Internal endpoint used by auth_request to verify access.
  location = /authelia_verify {
    internal;
    proxy_pass http://authelia_upstream/api/verify;
    proxy_set_header Host $host;
    proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Content-Length "";
    proxy_pass_request_body off;
  }

  # Exemption: keep status public for monitors.
  location = /api/status {
    proxy_pass http://omnistream_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Exempt signed newsletter image endpoints so email clients can load posters
  # without an Authelia session. These endpoints require exp+sig query params.
  location = /api/poster/signed {
    proxy_pass http://omnistream_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/newsletter/plex/thumb/signed {
    proxy_pass http://omnistream_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Everything else requires auth.
  location / {
    auth_request /authelia_verify;

    # Redirect unauthenticated users to the portal.
    error_page 401 =302 /authelia/?rd=$scheme://$http_host$request_uri;

    proxy_pass http://omnistream_upstream;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
