version: '3.8'

services:
  omnistream:
    image: ghcr.io/winky2000/omnistream:latest
    container_name: omnistream
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # No CORS needed when everything is same-origin behind Nginx.
      # - OMNISTREAM_CORS_ORIGINS=
    volumes:
      - ${SERVERS_PATH:-./servers.json}:/usr/src/app/servers.json
      # Persist config + history so Subscribers and auth settings survive container recreates.
      # IMPORTANT: ensure the host paths point to regular files (create them first),
      # otherwise Docker may create directories and OmniStream won't be able to write.
      - ${CONFIG_PATH:-./config.json}:/usr/src/app/config.json
      - ${HISTORY_DB_PATH:-./history.db}:/usr/src/app/history.db
      # Persist sent newsletter artifacts (Sent history page).
      # IMPORTANT: this must be a directory on the host.
      - ${SENT_NEWSLETTERS_PATH:-./sent_newsletters}:/usr/src/app/sent_newsletters
    networks:
      - internal

  authelia:
    image: authelia/authelia:latest
    container_name: omnistream-authelia
    restart: unless-stopped
    depends_on:
      - omnistream
    volumes:
      - ./deploy/nginx-authelia/authelia/configuration.yml:/config/configuration.yml:ro
      - ./deploy/nginx-authelia/authelia/users_database.yml:/config/users_database.yml:ro
      - authelia_data:/config
    environment:
      - TZ=Etc/UTC
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: omnistream-nginx
    restart: unless-stopped
    depends_on:
      - omnistream
      - authelia
    ports:
      # Example: http://localhost:8080
      - "8080:80"
    volumes:
      - ./deploy/nginx-authelia/nginx/omnistream.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  authelia_data:
